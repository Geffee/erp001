# CloudERP - Cloudflare 部署配置
name = "erp001"
compatibility_date = "2025-07-04"
main = "worker/index.ts"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "erp001-db"
database_id = ""

# 环境变量
[vars]
APP_NAME = "CloudERP"
APP_VERSION = "1.0.0"

# Pages 静态站点配置
[pages]
build_output_dir = "dist"
deployment_target = "production"
